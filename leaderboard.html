<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Leaderboard</title>
  <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
</head>
<body style="font-family:Arial;padding:20px;background:#f4f6f9;">
  <h2>🏆 Interactive Leaderboard Evolution</h2>
  <p style="color:#666;">
    Click names in the legend to hide/show players. Hover to see scores.
  </p>

  <div id="chart" style="width:100%;height:600px;background:white;border-radius:8px;box-shadow:0 4px 6px rgba(0,0,0,0.1);"></div>

  <script>
    const days = [0,1,4,5,6,7,8,11,12,13,14,15,18,19,20,21,22,25,26,27,28,29,33,34];

    // Names changed to initials
    const pts = {
      "JQ": [0,6,20,20,39,43,45,61,64,71,83,103,124,136,155,163,172,192,207,222,235,251,310,324], // Jose Quintella
      "AM": [0,3,23,27,39,41,41,56,66,74,80,94,115,125,142,154,166,183,197,211,214,242,301,316], // Ali Muqeem
      "TH": [0,6,33,36,55,59,62,78,85,91,95,113,127,131,146,156,163,184,196,211,223,239,298,315], // Tim Henkemans
      "PJ": [0,13,29,31,52,58,58,81,87,97,105,123,141,145,157,163,172,194,204,221,228,245,296,314], // Pol Joher
      "IO": [0,13,42,44,63,67,69,93,98,106,116,134,149,156,169,173,180,197,205,215,225,241,299,309], // Ivania Orellana
      "AA": [0,20,36,38,64,68,73,88,96,102,110,123,138,141,154,164,171,185,193,205,218,228,290,307], // Arturo Ascencio
      "DW": [0,10,21,26,45,51,56,74,78,86,91,105,120,128,144,151,155,177,185,200,212,226,290,304], // Divya Wahi
      "AC": [0,10,24,28,47,53,53,69,76,82,86,94,110,122,139,147,156,177,184,196,211,227,288,302], // Alexandra Cascao
      "PB": [0,10,33,35,47,53,55,67,73,81,87,98,114,124,136,146,155,175,183,193,203,219,286,300], // Pedro Botelho
      "NA": [0,20,47,59,71,75,80,95,98,104,110,120,134,138,153,165,172,189,197,208,214,230,286,298]  // Nassar Ahmed
    };

    const traces = [];

    for (const [name, points] of Object.entries(pts)) {
      traces.push({
        x: days,
        y: points,
        type: 'scatter',
        mode: 'lines+markers',
        name: name,
        hovertemplate:
          '<b>%{text}</b><br>' +
          'Points: %{y}<extra></extra>',
        text: Array(days.length).fill(name),
        showlegend: true   // ensure every trace shows in legend
      });
    }

    const layout = {
      xaxis: { title: 'Match Day' },
      yaxis: { title: 'Total Points' },
      hovermode: 'closest',
      showlegend: true,
      shapes: [
        {
          type: 'line',
          x0: 19,
          x1: 19,
          y0: 0,
          y1: 1,
          xref: 'x',
          yref: 'paper',
          line: {
            color: 'black',
            width: 2,
            dash: 'dash'
          }
        }
      ],
      annotations: [
        {
          x: 19,
          y: 1.02,
          xref: 'x',
          yref: 'paper',
          text: 'Knock Out',
          showarrow: false,
          font: { size: 12, color: 'black' }
        }
      ]
    };

    Plotly.newPlot('chart', traces, layout);
  </script>
</body>
</html>
